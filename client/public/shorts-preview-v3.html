<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숏폼 v3 미리보기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  p.desc { color: #64748b; margin-bottom: 30px; font-size: 13px; text-align: center; }
  .grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .frame { width: 240px; border-radius: 16px; overflow: hidden; border: 1px solid #334155; background: #1e293b; }
  .frame-label { padding: 10px 14px; font-size: 11px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #334155; }
  .frame-label span { color: #22c55e; }
  .canvas-wrap { aspect-ratio: 9/16; background: #000; }
  .canvas-wrap canvas { width: 100%; height: 100%; display: block; }
  .info { padding: 10px 14px; font-size: 11px; color: #64748b; line-height: 1.6; }
</style>
</head>
<body>
<h1>숏폼 v3 - 비율 맞춤 + 전체 자막</h1>
<p class="desc">배경 이미지가 잘리지 않고 비율에 맞게 표시됩니다. 나레이션 전체 자막이 하단에 표시됩니다.</p>

<div class="grid" id="grid"></div>

<script>
const W = 1080, H = 1920
const ACCENTS = ['#e57a00', '#2e7d32', '#1565c0']
const PASTELS = ['#FFF3E0', '#E8F5E9', '#E3F2FD']

const scenes = [
  {
    narration: '2026학년도 대입, 올해 뭐가 달라졌을까요? 핵심만 빠르게 정리해드립니다!',
    textOverlay: '2026 대입 핵심 변화',
    imgRatio: 1.5, // 가로형 이미지 시뮬레이션
    label: '가로형 이미지 (3:2)',
  },
  {
    narration: '수시 비율이 역대 최고입니다! 학생부 종합전형이 더 중요해졌습니다.',
    textOverlay: '수시 78.2% 역대 최고',
    imgRatio: 1.0, // 정사각형 이미지
    label: '정사각형 이미지 (1:1)',
  },
  {
    narration: '지금 바로 준비하세요. 3월 모의고사부터 전략적으로 접근해야 합니다!',
    textOverlay: '3월 모의고사 D-DAY',
    imgRatio: 0.5625, // 9:16 세로형
    label: '세로형 이미지 (9:16)',
  },
]

function wrapText(ctx, text, maxWidth) {
  const lines = []; let line = ''
  for (const ch of text) {
    const test = line + ch
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = ch }
    else line = test
  }
  if (line) lines.push(line)
  return lines
}

function createFakeImage(ratio, color) {
  const c = document.createElement('canvas')
  if (ratio >= 1) { c.width = 800; c.height = 800 / ratio }
  else { c.height = 800; c.width = 800 * ratio }
  const x = c.getContext('2d')
  // 그라데이션 배경
  const g = x.createLinearGradient(0, 0, c.width, c.height)
  g.addColorStop(0, color)
  g.addColorStop(1, '#1a1a2e')
  x.fillStyle = g; x.fillRect(0, 0, c.width, c.height)
  // 장식
  x.globalAlpha = 0.2; x.fillStyle = '#fff'
  x.beginPath(); x.arc(c.width * 0.3, c.height * 0.4, 100, 0, Math.PI * 2); x.fill()
  x.beginPath(); x.arc(c.width * 0.7, c.height * 0.6, 80, 0, Math.PI * 2); x.fill()
  x.globalAlpha = 1
  return c
}

const grid = document.getElementById('grid')

scenes.forEach((scene, idx) => {
  const div = document.createElement('div')
  div.className = 'frame'
  div.innerHTML = `
    <div class="frame-label">Scene ${idx + 1} <span>| ${scene.label}</span></div>
    <div class="canvas-wrap"><canvas id="sc${idx}"></canvas></div>
    <div class="info">${scene.label} → 비율 맞춤 표시</div>
  `
  grid.appendChild(div)

  requestAnimationFrame(() => {
    const canvas = document.getElementById(`sc${idx}`)
    canvas.width = W; canvas.height = H
    const ctx = canvas.getContext('2d')
    const accent = ACCENTS[idx]

    // 검은 배경
    ctx.fillStyle = '#000000'
    ctx.fillRect(0, 0, W, H)

    // 이미지 비율 맞춤 표시
    const fakeImg = createFakeImage(scene.imgRatio, PASTELS[idx])
    const imgRatio = fakeImg.width / fakeImg.height
    const canvasRatio = W / H
    let dx = 0, dy = 0, dw = W, dh = H
    if (imgRatio > canvasRatio) {
      dh = H; dw = H * imgRatio; dx = (W - dw) / 2
    } else {
      dw = W; dh = W / imgRatio; dy = (H - dh) / 2
    }
    ctx.drawImage(fakeImg, 0, 0, fakeImg.width, fakeImg.height, dx, dy, dw, dh)
    ctx.fillStyle = 'rgba(0,0,0,0.15)'
    ctx.fillRect(0, 0, W, H)

    // 하단 그라데이션
    const gradH = 550
    const grad = ctx.createLinearGradient(0, H - gradH, 0, H)
    grad.addColorStop(0, 'rgba(0,0,0,0)')
    grad.addColorStop(0.35, 'rgba(0,0,0,0.5)')
    grad.addColorStop(1, 'rgba(0,0,0,0.85)')
    ctx.fillStyle = grad
    ctx.fillRect(0, H - gradH, W, gradH)

    // textOverlay 뱃지
    ctx.font = 'bold 26px Pretendard'
    ctx.fillStyle = accent
    const bw = ctx.measureText(scene.textOverlay).width + 40
    ctx.beginPath(); ctx.roundRect(60, H - 420, bw, 42, 16); ctx.fill()
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'
    ctx.fillText(scene.textOverlay, 80, H - 392)

    // 전체 자막
    ctx.fillStyle = '#ffffff'
    ctx.font = 'bold 42px Pretendard'
    ctx.textAlign = 'left'
    const lines = wrapText(ctx, scene.narration, W - 140)
    const lineHeight = 54
    const maxLines = Math.min(lines.length, 6)
    const startY = H - 280 - (maxLines - 1) * (lineHeight / 2) + (maxLines * lineHeight / 2)
    lines.slice(0, maxLines).forEach((l, i) => {
      ctx.fillText(l, 70, startY + i * lineHeight)
    })

    // 프로그레스 바
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(0, 0, W, 4)
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W * ((idx + 1) / 3), 4)
  })
})
</script>
</body>
</html>
