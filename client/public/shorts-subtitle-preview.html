<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숏폼 자막 미리보기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  p.desc { color: #64748b; margin-bottom: 30px; font-size: 13px; }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .frame { width: 270px; border-radius: 16px; overflow: hidden; border: 1px solid #334155; background: #1e293b; }
  .frame-label { padding: 10px 14px; font-size: 12px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #334155; }
  .frame-label span { color: #22c55e; font-size: 11px; }
  .canvas-wrap { position: relative; aspect-ratio: 9/16; background: #000; }
  .canvas-wrap canvas { width: 100%; height: 100%; }
</style>
</head>
<body>
<h1>숏폼 영상 자막 미리보기 (3씬)</h1>
<p class="desc">Gemini AI 이미지 배경 + 나레이션 자막 오버레이 - 실제 영상에서 이렇게 보입니다</p>

<div class="grid" id="grid"></div>

<script>
const W = 1080, H = 1920
const ACCENTS = ['#e57a00', '#2e7d32', '#1565c0']
const PASTELS = ['#FFF3E0', '#E8F5E9', '#E3F2FD']

const scenes = [
  {
    num: 1,
    narration: '2026학년도 대입, 올해 뭐가 달라졌을까요? 핵심만 빠르게 정리해드립니다!',
    textOverlay: '2026 대입 핵심 변화',
    sub: '입시 전략의 첫걸음'
  },
  {
    num: 2,
    narration: '수시 비율이 역대 최고! 학생부 종합전형이 더 중요해졌습니다.',
    textOverlay: '수시 78.2% 역대 최고',
    sub: '학생부 종합전형 확대'
  },
  {
    num: 3,
    narration: '지금 바로 준비하세요. 3월 모의고사부터 전략적으로 접근해야 합니다!',
    textOverlay: '3월 모의고사 D-DAY',
    sub: '전략적 대비 시작'
  },
]

function wrapText(ctx, text, maxWidth) {
  const lines = []; let line = ''
  for (const ch of text) {
    const test = line + ch
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = ch }
    else line = test
  }
  if (line) lines.push(line)
  return lines
}

function drawScene(canvas, scene, idx) {
  const ctx = canvas.getContext('2d')
  canvas.width = W; canvas.height = H
  const accent = ACCENTS[idx]

  // 파스텔 배경 (실제로는 Gemini 이미지)
  ctx.fillStyle = PASTELS[idx]
  ctx.fillRect(0, 0, W, H)

  // 배경 장식 원
  ctx.globalAlpha = 0.15
  ctx.fillStyle = accent
  ctx.beginPath(); ctx.arc(W * 0.7, H * 0.3, 300, 0, Math.PI * 2); ctx.fill()
  ctx.beginPath(); ctx.arc(W * 0.2, H * 0.5, 200, 0, Math.PI * 2); ctx.fill()
  ctx.globalAlpha = 1

  // 살짝 어둡게 (이미지 위 오버레이)
  ctx.fillStyle = 'rgba(0,0,0,0.1)'
  ctx.fillRect(0, 0, W, H)

  // 하단 그라데이션
  const gradH = 550
  const grad = ctx.createLinearGradient(0, H - gradH, 0, H)
  grad.addColorStop(0, 'rgba(0,0,0,0)')
  grad.addColorStop(0.35, 'rgba(0,0,0,0.5)')
  grad.addColorStop(1, 'rgba(0,0,0,0.85)')
  ctx.fillStyle = grad
  ctx.fillRect(0, H - gradH, W, gradH)

  // 씬 번호 뱃지
  ctx.fillStyle = accent
  ctx.beginPath(); ctx.roundRect(60, H - 440, 80, 36, 12); ctx.fill()
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Pretendard'; ctx.textAlign = 'center'
  ctx.fillText(`${scene.num}/3`, 100, H - 416)

  // 나레이션 자막 (메인)
  ctx.fillStyle = '#ffffff'
  ctx.font = 'bold 46px Pretendard'
  ctx.textAlign = 'left'
  wrapText(ctx, scene.narration, W - 120).forEach((l, i) => {
    ctx.fillText(l, 60, H - 340 + i * 58)
  })

  // 서브 자막
  ctx.fillStyle = 'rgba(255,255,255,0.6)'
  ctx.font = '600 30px Pretendard'
  ctx.fillText(scene.sub, 60, H - 150)

  // 키워드 뱃지
  ctx.font = 'bold 28px Pretendard'
  ctx.fillStyle = accent
  const bw = ctx.measureText(scene.textOverlay).width + 40
  ctx.beginPath(); ctx.roundRect(60, H - 105, bw, 44, 16); ctx.fill()
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left'
  ctx.fillText(scene.textOverlay, 80, H - 76)

  // 프로그레스 바
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(0, 0, W, 5)
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W * ((idx + 1) / 3), 5)
}

const grid = document.getElementById('grid')
scenes.forEach((scene, i) => {
  const div = document.createElement('div')
  div.className = 'frame'
  div.innerHTML = `
    <div class="frame-label">Scene ${scene.num} <span>| 나레이션 자막 포함</span></div>
    <div class="canvas-wrap"><canvas id="sc${i}"></canvas></div>
  `
  grid.appendChild(div)
  requestAnimationFrame(() => drawScene(document.getElementById(`sc${i}`), scene, i))
})
</script>
</body>
</html>
