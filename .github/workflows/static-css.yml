# Static / CSS-heavy Web CI
#
# 이 파일을 프로젝트 루트의 .github/workflows/ci.yml 로 복사하세요.
# HTML/CSS 중심 프로젝트나 간단한 랜딩/정적 사이트에 맞춘 가벼운 CI입니다.
# package.json이 있으면 Node 스크립트를 실행하고, 없으면 기본 파일 구조만 확인합니다.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        if: hashFiles('package.json') != ''
        run: npm run lint --if-present

      - name: Test
        if: hashFiles('package.json') != ''
        run: npm test --if-present

      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      - name: Basic static file check
        shell: bash
        run: |
          if [ -f index.html ] || [ -d public ] || [ -d src ] || [ -d app ]; then
            echo "Static/web entry found."
          else
            echo "No common static/web entry found. Adjust this CI template for the project structure."
            exit 1
          fi
