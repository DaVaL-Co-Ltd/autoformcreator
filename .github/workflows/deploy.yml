# 호출자 (Caller) — 각 프로젝트에 복사
#
# 이 파일을 프로젝트 루트의 .github/workflows/deploy.yml 로 복사하세요.
# 배포 로직은 중앙 repo(DaVaL-Co-Ltd/ci-cd)의 vercel-deploy.yml 에 있고,
# 여기서는 그것을 호출하면서 Secret만 전달합니다.
#
# 아래 `uses:` 의 브랜치는 중앙 repo의 기본 브랜치에 맞춰 사용하세요.
#   예) DaVaL-Co-Ltd/ci-cd/.github/workflows/vercel-deploy.yml@v1

name: Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  vercel:
    uses: DaVaL-Co-Ltd/ci-cd/.github/workflows/vercel-deploy.yml@v1
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    # 필요하면 Node 버전 지정:
    # with:
    #   node-version: "22"
