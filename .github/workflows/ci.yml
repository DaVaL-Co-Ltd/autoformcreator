# Client Web CI
#
# APP_DIR를 바꾸면 하위 디렉토리 앱에서도 같은 템플릿을 재사용할 수 있습니다.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: client

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: Basic static file check
        shell: bash
        run: |
          if [ -f "$APP_DIR/index.html" ] || [ -d "$APP_DIR/public" ] || [ -d "$APP_DIR/src" ] || [ -d "$APP_DIR/app" ]; then
            echo "Static/web entry found."
          else
            echo "No common static/web entry found under $APP_DIR. Adjust APP_DIR or the project structure."
            exit 1
          fi
